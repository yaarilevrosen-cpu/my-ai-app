<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Cyber-Roaster ⚡</title>
    <style>
        * { box-sizing: border-box; }
        body {
            background-color: #080a0f;
            color: #00ffcc;
            font-family: 'Segoe UI', system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            background: #11141d;
            border: 2px solid #00ffcc;
            box-shadow: 0 0 30px rgba(0, 255, 204, 0.25);
            border-radius: 20px;
            padding: 35px;
            max-width: 700px;
            width: 100%;
            text-align: center;
        }
        h1 { color: #fff; text-shadow: 0 0 15px #00ffcc; margin-top: 0; font-size: 2.2rem; }
        p { color: #8a99ad; margin-bottom: 25px; font-size: 1.1rem; }
        
        .apiKeyBox {
            margin-bottom: 15px;
            text-align: right;
        }
        .apiKeyBox label { color: #8a99ad; font-size: 0.85rem; display: block; margin-bottom: 5px; }
        .apiKeyInput {
            width: 100%;
            background: #080a0f;
            border: 1px solid #242b38;
            border-radius: 8px;
            color: #00ffcc;
            padding: 8px 12px;
            font-size: 14px;
        }

        textarea {
            width: 100%;
            height: 140px;
            background: #080a0f;
            border: 1px solid #242b38;
            border-radius: 12px;
            color: #fff;
            padding: 15px;
            font-size: 16px;
            resize: none;
            outline: none;
            transition: border-color 0.3s;
        }
        textarea:focus { border-color: #00ffcc; box-shadow: 0 0 10px rgba(0, 255, 204, 0.2); }
        
        button {
            background: linear-gradient(135deg, #00ffcc, #00b894);
            color: #080a0f;
            font-weight: bold;
            font-size: 18px;
            border: none;
            padding: 15px 32px;
            border-radius: 10px;
            margin-top: 20px;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(0, 255, 204, 0.4);
            transition: all 0.2s;
            width: 100%;
        }
        button:hover { background: #fff; box-shadow: 0 0 30px #fff; transform: translateY(-2px); }
        
        #output {
            margin-top: 25px;
            padding: 20px;
            background: #080a0f;
            border-radius: 12px;
            color: #e6edf3;
            text-align: right;
            white-space: pre-wrap;
            min-height: 80px;
            border-right: 4px solid #00ffcc;
            font-size: 16px;
            line-height: 1.6;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>AI Cyber-Roaster ⚡</h1>
        <p>הכנס טקסט, קוד או רעיון – וקבל ניתוח שנון ומצחיק מ-Gemini!</p>
        
        <div class="apiKeyBox">
            <label>API Key (אופציונלי - אם בא לך תשובות בלייב מ-Gemini):</label>
            <input type="password" id="userApiKey" class="apiKeyInput" placeholder="הדבק כאן את ה-Gemini Key שלך (נשמר רק בדפדפן שלך)...">
        </div>

        <textarea id="userInput" placeholder="זרוק פה קוד, רעיון, או טקסט שבא לך לבדוק..."></textarea>
        <button onclick="analyze()">שרוף את זה! 🔥</button>

        <div id="output">התשובה תופיע פה...</div>
    </div>

    <script>
        async function analyze() {
            const input = document.getElementById('userInput').value;
            const apiKey = document.getElementById('userApiKey').value;
            const output = document.getElementById('output');
            
            if (!input.trim()) {
                output.innerText = "בחייך, תכתוב משהו קודם לפני שאתה לוחץ...";
                return;
            }

            output.innerText = "מנתח נתונים במעבדה... 🧠⚡";

            // אם המשתמש הזין API Key, נריץ קריאה אמיתית ל-Gemini API!
            if (apiKey.trim()) {
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{
                                parts: [{
                                    text: `אתה סטנדאפיסט ומבקר קוד/טקסט שנון ומצחיק. תן תגובה קצרה, קורעת ושנונה בעברית לטקסט הבא: ${input}`
                                }]
                            }]
                        })
                    });

                    const data = await response.json();
                    if (data.candidates && data.candidates[0].content.parts[0].text) {
                        output.innerText = data.candidates[0].content.parts[0].text;
                    } else {
                        output.innerText = "שגיאה בתשובה מ-Gemini. ודא שה-API Key תקין!";
                    }
                } catch (e) {
                    output.innerText = "שגיאה בהתחברות ל-API! בדוק את החיבור לרשת.";
                }
            } else {
                // הדמיה שנונה למקרה שאין API Key
                setTimeout(() => {
                    const roasts = [
                        "אוקיי, סרקתי את מה שכתבת... הדבר היחיד שחסר פה זה קצת הגיון! 😅",
                        "הקוד/טקסט הזה נראה כאילו נכתב ב-3 לפנות בוקר על שילוב של קפאין ומשאלת לב.",
                        "חזק מאוד! אם המטרה הייתה לבלבל את המחשב – הצלחת ב-100%.",
                        "פקחתי עיניים, קראתי את זה, ואני מבקש לחזור ל-Sleep Mode בבקשה."
                    ];
                    const randomRoast = roasts[Math.floor(Math.random() * roasts.length)];
                    output.innerText = randomRoast + "\n\n(💡 טיפ: הדבק את ה-API Key שלך למעלה כדי לקבל תשובות ייחודיות מ-Gemini בלייב!)";
                }, 1000);
            }
        }
    </script>
</body>
</html>
